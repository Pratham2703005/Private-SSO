name: E2E Fast Tests (PR)

on:
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          npm install --workspace=idp-server
          npm install --workspace=client-c
          npm install --workspace=test

      - name: Build apps
        run: |
          npm run build --workspace=idp-server || true
          npm run build --workspace=client-c || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: ./test

      - name: Start IDP Server
        run: npm run dev --workspace=idp-server &
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: test-secret
        timeout-minutes: 2

      - name: Wait for IDP Server
        run: timeout 30 bash -c 'until curl -f http://localhost:3000/health; do echo "Waiting for IDP..."; sleep 1; done'

      - name: Start Client C
        run: npm run dev --workspace=client-c &
        timeout-minutes: 2

      - name: Wait for Client C
        run: timeout 30 bash -c 'until curl -f http://localhost:3003; do echo "Waiting for Client C..."; sleep 1; done'

      - name: Run fast E2E tests (Widget + OAuth)
        run: npm run test:e2e:widget:fast
        working-directory: ./test
        timeout-minutes: 5

      - name: Upload Playwright Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr
          path: test/playwright-report/
          retention-days: 7
