name: E2E Full Suite (Nightly)

on:
  schedule:
    - cron: "0 2 * * *" # 2 AM UTC daily
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: |
          npm install --workspace=idp-server
          npm install --workspace=client-c
          npm install --workspace=test

      - name: Build apps
        run: |
          npm run build --workspace=idp-server || true
          npm run build --workspace=client-c || true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: ./test

      - name: Start IDP Server
        run: npm run dev --workspace=idp-server &
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: test-secret
        timeout-minutes: 2

      - name: Wait for IDP Server
        run: timeout 30 bash -c 'until curl -f http://localhost:3000/health; do echo "Waiting for IDP..."; sleep 1; done'

      - name: Start Client C
        run: npm run dev --workspace=client-c &
        timeout-minutes: 2

      - name: Wait for Client C
        run: timeout 30 bash -c 'until curl -f http://localhost:3003; do echo "Waiting for Client C..."; sleep 1; done'

      - name: Run full E2E test suite (all 70 tests)
        run: npm run test:e2e
        working-directory: ./test
        timeout-minutes: 20

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: test/playwright-report/
          retention-days: 14

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Nightly E2E tests failed. Check [Playwright Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})'
            })
